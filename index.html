    <style>
        /* Estilo Dark Neon / Cyberpunk basado en NANZZAPI */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0813; /* Fondo ultra oscuro con matiz morado */
            background-image: radial-gradient(#151026 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #94a3b8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor Principal superior */
        .main-container {
            max-width: 650px;
            width: 100%;
            margin-top: 20px;
        }

        /* Banner de Imagen Superior */
        .banner-manga {
            width: 100%;
            height: 220px;
            border-radius: 16px;
            border: 1px solid #231d3c;
            overflow: hidden;
            position: relative;
            background: #000;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Panel de Información Principal */
        .info-panel {
            background: rgba(18, 14, 34, 0.75);
            border: 1px solid #231d3c;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(8px);
        }

        .tagline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a855f7; /* Púrpura neón */
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tagline::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 2px;
            background: #a855f7;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 span {
            color: #a855f7; /* Resaltado morado */
        }

        .description {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 28px;
            font-weight: 400;
        }

        /* Títulos de categorías internos */
        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #cbd5e1;
            margin: 25px 0 15px 0;
            font-weight: 700;
        }

        /* Grid de Botones tipo Cápsula */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* Botones Estilo Contorno Tecnológico */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(30, 25, 53, 0.3);
            border: 1px solid #2e264f;
            border-radius: 8px;
            padding: 14px 16px;
            transition: all 0.2s ease;
        }

        .btn-link:hover {
            color: #ffffff;
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
            transform: translateY(-1px);
        }

        /* Botón Destacado de Comunidad Inferior */
        .btn-featured {
            grid-column: span 2;
            background: #a855f7;
            border: 1px solid #c084fc;
            color: #ffffff;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
        }

        .btn-featured:hover {
            background: #b55fe6;
            border-color: #d8b4fe;
            color: #ffffff;
            box-shadow: 0 4px 25px rgba(168, 85, 247, 0.45);
        }

        /* Adaptación para pantallas pequeñas */
        @media (max-width: 500px) {
            h1 { font-size: 1.9rem; }
            .button-grid { grid-template-columns: 1fr; }
            .btn-featured { grid-column: span 1; }
            .banner-manga { height: 160px; }
        }
    </style>
</head>
