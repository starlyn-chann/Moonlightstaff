<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilo Cómic Urbano / Novela Gráfica */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a; /* Fondo oscuro */
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            font-family: 'Oswald', sans-serif;
            color: #ffffff;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .comic-panel {
            max-width: 750px;
            width: 100%;
            background: #262626;
            border: 5px solid #ffffff;
            box-shadow: 12px 12px 0px #000000;
            padding: 40px 30px;
            margin: 20px 0;
            position: relative;
        }

        /* Encabezado estilo viñeta de impacto */
        header {
            text-align: center;
            background: #e63946; /* Rojo de acción */
            color: #ffffff;
            border: 4px solid #000000;
            padding: 25px 15px;
            margin-bottom: 40px;
            box-shadow: 6px 6px 0px #000000;
            transform: skew(-2deg);
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 3.5rem;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0px #000000;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #000000;
            display: inline-block;
            padding: 6px 15px;
            margin-top: 15px;
            border: 2px solid #ffffff;
        }

        /* Secciones tipo bloques de historieta */
        .comic-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-family: 'Bangers', cursive;
            font-size: 2.2rem;
            letter-spacing: 1px;
            color: #00ffffff; /* Cyan neón estilo cómic moderno */
            text-transform: uppercase;
            border-bottom: 4px dashed #ffffff;
            padding-bottom: 5px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px #000000;
        }

        .grid-bubbles {
            display: block;
            text-align: center;
        }

        /* Burbujas de texto angulares / estilo diálogo de acción moderno */
        .bubble-btn {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #000000;
            border: 3px solid #ffffff;
            padding: 14px 28px;
            margin: 12px;
            position: relative;
            box-shadow: 5px 5px 0px #000000;
            transition: all 0.1s ease;
            max-width: 100%;
        }

        .bubble-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px #e63946;
            background: #ffffff;
            color: #000000;
            border-color: #000000;
        }

        /* Pequeño rabillo angular inferior simulando bocadillo de diálogo serio */
        .bubble-btn::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 25px;
            border-width: 12px 12px 0 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }

        .bubble-btn:hover::after {
            border-color: #000000 transparent;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .comic-panel { padding: 20px 15px; }
            .bubble-btn { display: block; margin: 20px auto; }
        }
    </style>
</head>

        <div class="comic-section">

                </a>
            </div>
        </div>

        <div class="comic-section">

            <div class="grid-bubbles">
                <a href="https://whatsapp.com/channel/0029Vb7vqNDCsU9MnOn8UN0U" target="_blank" class="bubble-btn">

    </div>

</body>
</html>
